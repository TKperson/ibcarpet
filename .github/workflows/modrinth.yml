name: Release Published Workflow to Modrinth

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: Artifacts
          path: Artifacts
      - id: version
        run: |
          GAME_VERSION="${GITHUB_REF_NAME%%-*}"
          echo "game_version=$GAME_VERSION" >> "$GITHUB_OUTPUT"
      - uses: cloudnode-pro/modrinth-publish@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project: IBCarpet
          version: ${{ github.event.release.tag_name }}
          loaders: fabric
          game-versions: ${{ steps.version.outputs.game_version }}
          files: Artifacts/IBCarpet-${{ github.event.release.tag_name }}.jar
